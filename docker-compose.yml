services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: msl-backend

    environment:
      - MSL_SERVER_MODE=server

    ports:
      - "8000:8000"

    mem_limit: 4g
    mem_reservation: 2g

    volumes:
      - ./output:/root/Resultados
      - ./cache:/tmp/msl_process_cache

    restart: unless-stopped


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: msl-frontend

    ports:
      - "3000:3000"

    environment:
      - HOST=0.0.0.0
      - REACT_APP_API_URL=http://localhost:8000

    depends_on:
      - backend

    restart: unless-stopped